<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0e12">
<title>Inventory — TC22 Test</title>
<style>
  :root{--teal:#33b6c2;--teal-d:#1f8d98;--orange:#e87440;--navy:#15243f;--bg:#eef1f5;--card:#fff;--line:#d8dee6;--ink:#1c2330;--muted:#6b7682;--field:#f4f6f9}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;min-height:100%}
  body{background:var(--bg);color:var(--ink);font-family:"Segoe UI",Roboto,system-ui,sans-serif;display:flex;justify-content:center}
  .app{width:100%;max-width:460px;min-height:100vh;display:flex;flex-direction:column}

  .bar{background:#0b0e12;display:flex;align-items:center;gap:11px;padding:11px 14px}
  .bar a{color:#cdd6e0;text-decoration:none;font-size:20px}
  .bar svg{height:30px;width:auto}
  .bar .t{color:#fff;font-size:13px;font-weight:600;margin-left:auto}

  .content{flex:1;padding:14px;overflow-y:auto}
  .stub{background:#fff5ec;border:1px solid #f3c79a;color:#a85410;border-radius:10px;padding:10px 12px;font-size:11.5px;line-height:1.5;margin-bottom:14px}

  .scanbig{border:2.5px dashed var(--teal);background:#eaf6f8;border-radius:16px;padding:24px 14px;text-align:center;color:var(--teal-d);margin-bottom:14px}
  .scanbig .ic{font-size:42px}.scanbig b{display:block;font-size:16px;margin-top:6px}.scanbig span{font-size:12px;color:var(--muted)}

  .search{display:flex;gap:8px;margin-bottom:14px}
  .search input{flex:1;border:1px solid var(--line);background:#fff;border-radius:10px;padding:11px;font-size:14px;font-family:inherit}
  .search input:focus{outline:none;border-color:var(--teal)}

  h2{font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--teal-d);margin:0 0 9px}
  .item{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px;margin-bottom:9px}
  .item .th{width:46px;height:46px;border-radius:9px;background:linear-gradient(135deg,#7d8a99,#56616f);flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700}
  .item .d b{font-size:13.5px;display:block}
  .item .d span{font-size:11.5px;color:var(--muted)}
  .item .qty{margin-left:auto;text-align:right;font-size:12px}
  .item .qty b{font-size:16px;color:var(--navy)}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1c2330;color:#fff;padding:10px 16px;border-radius:20px;font-size:12px;opacity:0;transition:.25s;white-space:nowrap}
  .toast.show{opacity:1;bottom:34px}
</style>

<div class="app">
  <div class="bar">
    <a href="TC22_Test_Hub.html">‹</a>
    <svg viewBox="0 0 624 150" xmlns="http://www.w3.org/2000/svg" aria-label="LCL">
      <rect x="8" y="14" width="42" height="48" rx="13" fill="#33b6c2"/>
      <polygon points="124,12 124,98 54,55" fill="#33b6c2"/>
      <path d="M8,108 q16,-15 32,0 t32,0 t32,0" stroke="#e87440" stroke-width="11" fill="none" stroke-linecap="round"/>
      <path d="M8,130 q16,-15 32,0 t32,0 t32,0" stroke="#e87440" stroke-width="11" fill="none" stroke-linecap="round"/>
      <text x="138" y="118" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="104" fill="#33b6c2">LCL</text>
      <text x="350" y="66" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="54" fill="#33b6c2">OCEAN</text>
      <text x="350" y="120" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="47" fill="#e87440">SERVICES</text>
    </svg>
    <span class="t">Inventory</span>
  </div>

  <div class="content">
    <div class="stub">⚠ Placeholder for the <b>Warehouse Inventory App</b>. Wiring pending — point me to the real app and this connects to live Bubble inventory.</div>

    <div class="scanbig" onclick="scan()">
      <div class="ic">▦</div>
      <b>Scan item / location</b>
      <span>Or pull the TC22 trigger</span>
    </div>

    <div class="search">
      <input id="q" placeholder="Search inventory…" oninput="filter()">
    </div>

    <h2>On hand</h2>
    <div id="list"></div>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script>
  var DATA=[
    {n:"Nike Air Max 270 — blk/wht",loc:"A-12",qty:"12 prs"},
    {n:"Ray-Ban Wayfarer RB2140",loc:"B-04",qty:"24 ea"},
    {n:"Puma Essentials hoodie — L",loc:"A-07",qty:"20 ea"},
    {n:"Luxottica frames — assorted",loc:"C-11",qty:"30 ea"},
    {n:"Amazon Basics HDMI 6ft",loc:"D-02",qty:"50 ea"},
    {n:"Oakley Holbrook — matte blk",loc:"B-09",qty:"18 ea"}
  ];
  function render(rows){
    var box=document.getElementById('list');box.innerHTML='';
    rows.forEach(function(r,i){
      var d=document.createElement('div');d.className='item';
      d.innerHTML='<div class="th">IMG_'+(i+1)+'</div>'+
        '<div class="d"><b>'+r.n+'</b><span>WH LOC '+r.loc+'</span></div>'+
        '<div class="qty"><b>'+r.qty.split(' ')[0]+'</b><br><span style="color:var(--muted)">'+(r.qty.split(' ')[1]||'')+'</span></div>';
      box.appendChild(d);
    });
  }
  function filter(){var q=document.getElementById('q').value.toLowerCase();
    render(DATA.filter(function(r){return r.n.toLowerCase().indexOf(q)>-1||r.loc.toLowerCase().indexOf(q)>-1;}));}
  function scan(){toast('Scanned — item identified (demo)');}
  var tT;function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tT);tT=setTimeout(function(){t.classList.remove('show')},1700);}
  render(DATA);
</script>
